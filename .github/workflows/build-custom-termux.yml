name: Build Custom Standalone Termux

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Inject Secure Package and SDK Overrides
        run: |
          echo "Injecting structured configuration overrides safely..."
          
          # Append a robust, native compilation rule to the primary build file.
          # This forces Gradle to rename the application package across all manifests
          # and handles resource compilation natively, avoiding file corruption.
          cat << 'EOF' >> app/build.gradle

          android {
              defaultConfig {
                  // Renames the app safely so it coexists as a standalone clone
                  applicationId "com.termux.custom"
                  
                  // Enforces legacy execution permissions at the OS layer
                  targetSdkVersion 28
                  
                  // Clear out process sharing constraints causing install collisions
                  manifestPlaceholders = [
                      TERMUX_PACKAGE_NAME: "com.termux.custom",
                      termux_app_package_name: "com.termux.custom"
                  ]
              }
          }

          // Ensure all underlying library submodules strictly align to target 28
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          defaultConfig {
                              targetSdkVersion 28
                          }
                      }
                  }
              }
          }
          EOF

          echo "Updating internal file system and path identifiers..."
          # Strip out framework level installation sharing keys safely
          find . -type f -name "AndroidManifest.xml" -exec sed -i 's/android:sharedUserId="[^"]*"//g' {} +
          find . -type f -name "AndroidManifest.xml" -exec sed -i 's/android:sharedUserLabel="[^"]*"//g' {} +

          # Align internal terminal directory structures to use the new package space
          find . -type f \( -name "*.java" -o -name "*.kt" -o -name "*.xml" -o -name "*.sh" \) -exec sed -i 's/\/data\/data\/com\.termux/\/data\/data\/com\.termux\.custom/g' {} +
          find . -type f \( -name "TermuxConstants.java" -o -name "TermuxConstants.kt" -o -name "termux.properties" \) -exec sed -i 's/"com\.termux"/"com\.termux\.custom"/g' {} +
          find . -type f -name "strings.xml" -exec sed -i 's/>com\.termux</>com\.termux\.custom</g' {} +

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Build Standalone APK with Gradle
        run: |
          # The debug build task automatically handles test signatures correctly
          ./gradlew assembleDebug --stacktrace

      - name: Upload Custom APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: termux-custom-standalone
          path: app/build/outputs/apk/debug/*.apk
