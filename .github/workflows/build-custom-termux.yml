name: Build Custom Standalone Termux

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Refactor Package Name and File Paths
        run: |
          echo "Refactoring package identifiers..."
          # 1. Change the application package names globally
          # This converts com.termux to com.termux.custom
          find . -type f \( -name "*.java" -o -name "*.kt" -o -name "*.xml" -o -name "*.gradle" -o -name "*.pro" \) -exec sed -i 's/com\.termux/com\.termux\.custom/g' {} +

          echo "Refactoring hardcoded filesystem paths..."
          # 2. Change the Unix filesystem environment path structure 
          # This converts /data/data/com.termux to /data/data/com.termux.custom
          find . -type f \( -name "*.java" -o -name "*.kt" -o -name "*.xml" -o -name "*.sh" -o -name "*.properties" \) -exec sed -i 's/\/data\/data\/com\.termux/\/data\/data\/com\.termux\.custom/g' {} +

          echo "Refactoring directory structures..."
          # 3. Move the physical Java/Kotlin package directory layout to match the new package ID
          # Loops through all instances of the package directory and renames/moves them
          find . -depth -type d -path "*/com/termux" | while read -r dir; do
            mv "$dir" "$(dirname "$dir")/termux_custom"
          done
          find . -depth -type d -path "*/com/termux_custom" | while read -r dir; do
            mv "$dir" "$(dirname "$dir")/termux/custom"
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload Custom APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: termux-custom-standalone
          path: app/build/outputs/apk/debug/*.apk
