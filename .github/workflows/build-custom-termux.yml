name: Build Custom Standalone Termux

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Configure Native Project Properties
        run: |
          echo "Updating workspace package identifier..."
          find . -type f -name "gradle.properties" -exec sed -i 's/com\.termux/com\.termux\.custom/g' {} +

          echo "Injecting native SDK 28 flags into the app build configuration..."
          # This safely configures the application parameters using standard Gradle syntax
          if [ -f app/build.gradle ]; then
              sed -i 's/applicationId "com.termux"/applicationId "com.termux.custom"/g' app/build.gradle
          fi

          echo "Injecting comprehensive submodule build enforcer..."
          # This appends a standard project evaluation block to ensure every dependent library 
          # targets SDK 28 cleanly at the compiler layer, preventing manifest merger conflicts.
          cat << 'EOF' >> build.gradle

          allprojects {
              subprojects {
                  afterEvaluate { project ->
                      if (project.hasProperty('android')) {
                          project.android {
                              defaultConfig {
                                  targetSdkVersion 28
                              }
                          }
                      }
                  }
              }
          }
          EOF

          echo "Cleaning conflicting sharing attributes from manifest templates..."
          find . -type f -name "AndroidManifest.xml" -exec sed -i 's/android:sharedUserId="[^"]*"//g' {} +
          find . -type f -name "AndroidManifest.xml" -exec sed -i 's/android:sharedUserLabel="[^"]*"//g' {} +

          echo "Updating internal package string alignments..."
          find . -type f -name "AndroidManifest.xml" -exec sed -i 's/com\.termux\.settings/com\.termux\.custom\.settings/g' {} +
          find . -type f -name "AndroidManifest.xml" -exec sed -i 's/com\.termux\.fileprovider/com\.termux\.custom\.fileprovider/g' {} +
          find . -type f -name "AndroidManifest.xml" -exec sed -i 's/com\.termux\.authority/com\.termux\.custom\.authority/g' {} +
          find . -type f -name "AndroidManifest.xml" -exec sed -i 's/com\.termux\.permission/com\.termux\.custom\.permission/g' {} +

          echo "Overriding internal file system path strings..."
          find . -type f \( -name "*.java" -o -name "*.kt" -o -name "*.xml" -o -name "*.sh" \) -exec sed -i 's/\/data\/data\/com\.termux/\/data\/data\/com\.termux\.custom/g' {} +

          echo "Updating runtime application constants..."
          find . -type f \( -name "TermuxConstants.java" -o -name "TermuxConstants.kt" -o -name "termux.properties" \) -exec sed -i 's/"com\.termux"/"com\.termux\.custom"/g' {} +
          find . -type f -name "strings.xml" -exec sed -i 's/>com\.termux</>com\.termux\.custom</g' {} +

          echo "Native project alignment configuration ready."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Build Standalone APK with Gradle
        run: |
          ./gradlew assembleDebug --stacktrace

      - name: Upload Custom APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: termux-custom-standalone
          path: app/build/outputs/apk/debug/*.apk
