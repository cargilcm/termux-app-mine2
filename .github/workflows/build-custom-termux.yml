name: Build Custom Standalone Termux

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Dynamic Legacy Target Injection
        run: |
          echo "Overriding baseline workspace configurations..."
          find . -type f -name "gradle.properties" -exec sed -i 's/com\.termux/com\.termux\.custom/g' {} +

          echo "Enforcing Target SDK 28 inside app configuration..."
          # We force targetSdkVersion to 28 but let compileSdkVersion remain high so libraries build.
          if [ -f app/build.gradle ]; then
              sed -i 's/targetSdkVersion.*/targetSdkVersion 28/g' app/build.gradle
              sed -i 's/applicationId "com.termux"/applicationId "com.termux.custom"/g' app/build.gradle
          fi

          echo "Injecting Global Subproject Level Enforcer..."
          # Lock targetSdkVersion down across any secondary submodules
          cat << 'EOF' >> build.gradle

          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          defaultConfig {
                              targetSdkVersion 28
                          }
                      }
                  }
              }
          }
          EOF

          echo "Removing conflicting sharedUserId elements from templates..."
          find . -type f -name "AndroidManifest.xml" -exec sed -i 's/android:sharedUserId="[^"]*"//g' {} +
          find . -type f -name "AndroidManifest.xml" -exec sed -i 's/android:sharedUserLabel="[^"]*"//g' {} +

          echo "Overriding internal file system environments..."
          find . -type f \( -name "*.java" -o -name "*.kt" -o -name "*.xml" -o -name "*.sh" \) -exec sed -i 's/\/data\/data\/com\.termux/\/data\/data\/com\.termux\.custom/g' {} +

          echo "Updating runtime constants..."
          find . -type f \( -name "TermuxConstants.java" -o -name "TermuxConstants.kt" -o -name "termux.properties" \) -exec sed -i 's/"com\.termux"/"com\.termux\.custom"/g' {} +
          find . -type f -name "strings.xml" -exec sed -i 's/>com\.termux</>com\.termux\.custom</g' {} +

          echo "Compiler execution rules clamped to Runtime API 28."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Build Standalone APK with Gradle
        run: |
          ./gradlew assembleDebug --stacktrace

      - name: Upload Custom APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: termux-custom-standalone
          path: app/build/outputs/apk/debug/*.apk
