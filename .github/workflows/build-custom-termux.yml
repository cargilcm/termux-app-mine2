name: Build Custom Standalone Termux

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Overwrite Build Properties and Environment Paths
        run: |
          echo "Overriding root Gradle package identity configuration..."
          # 1. Modify the core package configurations in the properties files
          # This forces the build system to change TERMUX_PACKAGE_NAME and all dependent permissions natively
          find . -type f -name "gradle.properties" -exec sed -i 's/com\.termux/com\.termux\.custom/g' {} +

          echo "Applying OS-level package suffix..."
          # 2. Instruct the app module to append the custom package suffix
          sed -i '/defaultConfig {/a \        applicationIdSuffix ".custom"' app/build.gradle

          echo "Removing conflicting sharedUserId declarations..."
          # 3. Strip out the sharedUserId property from the manifest template entirely
          find . -type f -name "AndroidManifest.xml" -exec sed -i 's/android:sharedUserId="[^"]*"//g' {} +
          find . -type f -name "AndroidManifest.xml" -exec sed -i 's/android:sharedUserLabel="[^"]*"//g' {} +

          echo "Decoupling unique content provider authorities..."
          # 4. Change hardcoded layout string authorities to prevent OS conflicts
          find . -type f \( -name "AndroidManifest.xml" -o -name "*.java" -o -name "*.kt" \) -exec sed -i 's/"com\.termux\.settings"/"com\.termux\.custom\.settings"/g' {} +
          find . -type f \( -name "AndroidManifest.xml" -o -name "*.java" -o -name "*.kt" \) -exec sed -i 's/android:authorities="com\.termux\./android:authorities="com\.termux\.custom\./g' {} +

          echo "Overriding internal filesystem environments..."
          # 5. Globally rewrite hardcoded directory environments to use an isolated sandbox location
          find . -type f \( -name "*.java" -o -name "*.kt" -o -name "*.xml" -o -name "*.sh" \) -exec sed -i 's/\/data\/data\/com\.termux/\/data\/data\/com\.termux\.custom/g' {} +

          echo "Isolating runtime package parameters..."
          # 6. Force update runtime constants, internal java properties, and resource files
          find . -type f \( -name "TermuxConstants.java" -o -name "TermuxConstants.kt" -o -name "termux.properties" \) -exec sed -i 's/"com\.termux"/"com\.termux\.custom"/g' {} +
          find . -type f -name "strings.xml" -exec sed -i 's/>com\.termux</>com\.termux\.custom</g' {} +

          echo "Standalone decoupling modifications applied successfully."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Build Standalone APK with Gradle
        run: |
          ./gradlew assembleDebug --stacktrace

      - name: Upload Custom APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: termux-custom-standalone
          path: app/build/outputs/apk/debug/*.apk
